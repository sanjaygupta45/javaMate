# =========================================================
# APPLICATION CONFIGURATION
# =========================================================

spring.application.name=javamate
server.port=8081
server.servlet.context-path=/mate
spring.main.allow-bean-definition-overriding=true


# =========================================================
# DATABASE CONFIGURATION
# =========================================================

spring.datasource.url=jdbc:mysql://mysql-14922bd8-sanjay-5376.a.aivencloud.com:17785/defaultdb?ssl-mode=REQUIRED&useSSL=true&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=avnadmin
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=HikariPool


# =========================================================
# DEEPSEEK CHAT MODEL CONFIGURATION
# =========================================================

spring.ai.openai.api-key=${DEEPSEEK_API_KEY}
spring.ai.openai.base-url=https://api.deepseek.com
spring.ai.openai.chat.options.model=deepseek-chat
spring.ai.openai.chat.options.temperature=0.2

# =========================================================
# MISTRAL EMBEDDING MODEL CONFIGURATION
# =========================================================

spring.ai.mistralai.api-key=${MISTRAL_API_KEY}
spring.ai.mistralai.embedding.options.model=mistral-embed




# =========================================================
# QDRANT VECTOR DATABASE
# =========================================================

spring.ai.vectorstore.qdrant.host=819ed3df-7926-4a5e-9462-95c08057ab29.sa-east-1-0.aws.cloud.qdrant.io
spring.ai.vectorstore.qdrant.port=6334
spring.ai.vectorstore.qdrant.api-key=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJhY2Nlc3MiOiJtIiwic3ViamVjdCI6ImFwaS1rZXk6ZTBmNDc0ZjUtOGNkOS00N2M1LWI0MTYtOGU4ZGI5YmM1ZmE5In0.2N0AGypiHNiX-vqhWepo7nWUjRc9mMGRz8xhe9jgJmk
spring.ai.vectorstore.qdrant.collection-name=javaMate-collection
spring.ai.vectorstore.qdrant.use-tls=true
