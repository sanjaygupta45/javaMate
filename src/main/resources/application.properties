# =========================================================
# APPLICATION CONFIGURATION
# =========================================================

spring.application.name=javamate
server.port=8081
spring.webflux.base-path=/mate
spring.main.allow-bean-definition-overriding=true


# =========================================================
# FILE UPLOAD CONFIGURATION (100MB limit)
# =========================================================

spring.webflux.multipart.max-file-size=100MB
spring.webflux.multipart.max-part-size=100MB
spring.webflux.multipart.max-in-memory-size=20MB
spring.codec.max-in-memory-size=100MB


# =========================================================
# R2DBC DATABASE CONFIGURATION (Reactive)
# =========================================================

spring.r2dbc.url=r2dbc:mysql://mysql-14922bd8-sanjay-5376.a.aivencloud.com:17785/defaultdb?sslMode=REQUIRED
spring.r2dbc.username=avnadmin
spring.r2dbc.password=${MYSQL_PASSWORD}

# Connection Pool
spring.r2dbc.pool.initial-size=5
spring.r2dbc.pool.max-size=10
spring.r2dbc.pool.max-idle-time=30m


# =========================================================
# MISTRAL AI CONFIGURATION (Chat & Embeddings)
# =========================================================

spring.ai.mistralai.api-key=${MISTRAL_API_KEY}
spring.ai.mistralai.chat.options.model=mistral-large-latest
spring.ai.mistralai.chat.options.temperature=0.2
spring.ai.mistralai.embedding.options.model=mistral-embed




# =========================================================
# QDRANT VECTOR DATABASE
# =========================================================

spring.ai.vectorstore.qdrant.host=819ed3df-7926-4a5e-9462-95c08057ab29.sa-east-1-0.aws.cloud.qdrant.io
spring.ai.vectorstore.qdrant.port=6334
spring.ai.vectorstore.qdrant.api-key=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJhY2Nlc3MiOiJtIiwic3ViamVjdCI6ImFwaS1rZXk6ZTBmNDc0ZjUtOGNkOS00N2M1LWI0MTYtOGU4ZGI5YmM1ZmE5In0.2N0AGypiHNiX-vqhWepo7nWUjRc9mMGRz8xhe9jgJmk
spring.ai.vectorstore.qdrant.collection-name=javaMate-collection
spring.ai.vectorstore.qdrant.use-tls=true
spring.ai.vectorstore.qdrant.initialize-schema=true



# =========================================================
# ACTUATOR CONFIGURATION
# =========================================================

management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.endpoint.prometheus.enabled=true

# Metrics tag
management.metrics.tags.application=${spring.application.name}


# =========================================================
# PROMETHEUS METRICS
# =========================================================

management.prometheus.metrics.export.enabled=true


# =========================================================
# ENABLE IMPORTANT METRICS
# =========================================================

management.metrics.enable.jvm=true
management.metrics.enable.jdbc=true
management.metrics.enable.hikaricp=true
management.metrics.enable.http.server.requests=true
management.metrics.enable.tomcat=true


# =========================================================
# OPEN TELEMETRY TRACING
# =========================================================

management.tracing.enabled=true
management.tracing.sampling.probability=1.0

otel.service.name=${spring.application.name}

# OTEL Collector (Docker service name)
otel.exporter.otlp.endpoint=http://otel-collector:4317

otel.traces.exporter=otlp
otel.metrics.exporter=none
otel.logs.exporter=none


# =========================================================
# LOGGING CONFIGURATION
# =========================================================

logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.com.mmf=DEBUG
logging.level.org.hibernate.orm.connections.pooling=WARN

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n


# =========================================================
# JWT CONFIGURATION
# =========================================================

jwt.secret=${JWT_SECRET:mySecretKeyForJwtTokenGenerationAndValidationMustBeAtLeast256BitsLong}
jwt.expiration-days=2


# =========================================================
# CHAT MEMORY CONFIGURATION
# =========================================================

# Number of recent messages (USER + ASSISTANT) to include in conversation context sent to LLM
javamate.chat.memory.window-size=20
# Default window size for memory service
javamate.chat.memory.default-window-size=20
# Maximum USER messages allowed per session (assistant responses don't count towards limit)
javamate.chat.memory.max-messages-per-session=20


# =========================================================
# KNOWLEDGE BASE CONFIGURATION
# =========================================================

# Maximum documents allowed per user in the knowledge base
javamate.knowledge-base.max-documents-per-user=10


