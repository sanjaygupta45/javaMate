# =============================================================================
# JavaMate - Cloud Run Configuration Profile
# =============================================================================



# =========================================================
# APPLICATION CONFIGURATION
# =========================================================

spring.application.name=javamate
server.port=${PORT:8080}
# HTTP/2 cleartext (h2c) is enabled programmatically in NettyH2cConfig.
# Required so Cloud Run (deployed with --use-http2) can stream large
# uploads without the 32 MiB HTTP/1 request-body cap.
spring.webflux.base-path=/mate
spring.main.allow-bean-definition-overriding=true
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://java-mate-fe.vercel.app}


# =========================================================
# FILE UPLOAD CONFIGURATION (100MB limit)
# =========================================================

spring.webflux.multipart.max-file-size=100MB
spring.webflux.multipart.max-part-size=100MB
spring.webflux.multipart.max-in-memory-size=20MB
spring.codec.max-in-memory-size=100MB


# =========================================================
# CLOUD SQL DATABASE CONFIGURATION (R2DBC)
# =========================================================
# For Cloud Run + R2DBC: Use Cloud SQL Public IP
# Cloud SQL encrypts traffic by default, sslMode=PREFERRED is safer
# =========================================================

spring.r2dbc.url=r2dbc:mysql://${CLOUD_SQL_HOST}:3306/${CLOUD_SQL_DATABASE:javamate}?sslMode=PREFERRED&connectTimeout=PT30S&socketTimeout=PT30S
spring.r2dbc.username=${CLOUD_SQL_USERNAME:javamate}
spring.r2dbc.password=${MYSQL_PASSWORD}
spring.r2dbc.pool.enabled=true
spring.r2dbc.pool.initial-size=1
spring.r2dbc.pool.max-size=5
spring.r2dbc.pool.max-idle-time=10m
spring.r2dbc.pool.max-create-connection-time=60s
spring.r2dbc.pool.validation-query=SELECT 1



# =========================================================
# MISTRAL AI CONFIGURATION (Chat & Embeddings)
# =========================================================

spring.ai.mistralai.api-key=${MISTRAL_API_KEY}
spring.ai.mistralai.chat.options.model=mistral-large-latest
spring.ai.mistralai.chat.options.temperature=0.2
spring.ai.mistralai.embedding.options.model=mistral-embed


# =========================================================
# QDRANT VECTOR DATABASE
# =========================================================

spring.ai.vectorstore.qdrant.host=${QDRANT_HOST:819ed3df-7926-4a5e-9462-95c08057ab29.sa-east-1-0.aws.cloud.qdrant.io}
spring.ai.vectorstore.qdrant.port=6334
spring.ai.vectorstore.qdrant.api-key=${QDRANT_API_KEY}
spring.ai.vectorstore.qdrant.collection-name=javaMate-collection
spring.ai.vectorstore.qdrant.use-tls=true
spring.ai.vectorstore.qdrant.initialize-schema=true


# =========================================================
# ACTUATOR / HEALTH CHECKS
# =========================================================

management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.endpoint.prometheus.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.enable.jvm=true
management.metrics.enable.http.server.requests=true


# =========================================================
# PROMETHEUS METRICS
# =========================================================

management.prometheus.metrics.export.enabled=true


# =========================================================
# OPEN TELEMETRY TRACING (GCP Cloud Trace)
# =========================================================

management.tracing.enabled=true
management.tracing.sampling.probability=0.1

otel.service.name=${spring.application.name}
otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT}
otel.traces.exporter=${OTEL_TRACES_EXPORTER:none}
otel.metrics.exporter=none
otel.logs.exporter=none


# =========================================================
# LOGGING CONFIGURATION (Cloud Run structured logging)
# =========================================================

logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.com.example.javamate=INFO
logging.pattern.console={"timestamp":"%d{yyyy-MM-dd HH:mm:ss.SSS}","level":"%level","thread":"%thread","logger":"%logger{36}","message":"%msg"}%n


# =========================================================
# JWT CONFIGURATION
# =========================================================

jwt.secret=${JWT_SECRET}
jwt.expiration-days=2


# =========================================================
# GOOGLE OAUTH2 CONFIGURATION
# =========================================================

google.oauth2.client-ids=${GOOGLE_OAUTH_CLIENT_IDS}
google.oauth2.accepted-issuers=${GOOGLE_OAUTH_ACCEPTED_ISSUERS:https://accounts.google.com,accounts.google.com}


# =========================================================
# CHAT MEMORY CONFIGURATION
# =========================================================

javamate.chat.memory.window-size=20
javamate.chat.memory.default-window-size=20
# Max USER messages per conversation. Assistant / system / summary rows are excluded.
# When exceeded the API returns 400 SESSION_LIMIT_EXCEEDED; the client must call
# POST /mate/chat/sessions/new and continue under the new sessionId.
javamate.chat.memory.max-messages-per-session=30


# =========================================================
# KNOWLEDGE BASE CONFIGURATION
# =========================================================

javamate.knowledge-base.max-documents-per-user=10


# =========================================================
# SWAGGER / OPENAPI CONFIGURATION
# =========================================================

# =========================================================
# MULTI-AGENT / WEB SEARCH CONFIGURATION
# =========================================================

javamate.web-search.provider=${WEB_SEARCH_PROVIDER:tavily}
javamate.web-search.tavily.api-key=${TAVILY_API_KEY}


springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.show-actuator=false
