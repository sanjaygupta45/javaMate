# =========================================================
# TEST-ONLY OVERRIDES
# =========================================================
# Provides dummy values so the Spring context can boot during
# `mvn test` (no real env vars, no real network calls).
# These never apply in dev/prod.
# =========================================================

spring.main.allow-bean-definition-overriding=true

# Disable tracing exporter in tests (no otel-collector running)
management.tracing.enabled=false
otel.traces.exporter=none

# Dummy credentials -- the test only verifies the context loads,
# it does NOT actually call Mistral / Qdrant / MySQL.
spring.ai.mistralai.api-key=test-dummy-key
spring.ai.vectorstore.qdrant.host=localhost
spring.ai.vectorstore.qdrant.port=6334
spring.ai.vectorstore.qdrant.api-key=test-dummy-key
spring.ai.vectorstore.qdrant.collection-name=test-collection
spring.ai.vectorstore.qdrant.use-tls=false
spring.ai.vectorstore.qdrant.initialize-schema=false

# Use embedded test connection settings (will not actually connect)
spring.r2dbc.url=r2dbc:mysql://localhost:3306/test
spring.r2dbc.username=test
spring.r2dbc.password=test
spring.r2dbc.pool.initial-size=0
spring.r2dbc.pool.max-size=1

# JWT - any 256-bit string is fine for context loading
jwt.secret=test-secret-key-for-jwt-must-be-at-least-256-bits-long-padding-padding

