apiVersion: 1

datasources:

  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    uid: prometheus_uid
    isDefault: true
    editable: true

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    uid: loki_uid
    editable: true
    jsonData:
      derivedFields:
        - datasourceUid: tempo_uid
          matcherRegex: "traceId=(\\w+)"
          name: TraceID
          url: "$${__value.raw}"

  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    uid: tempo_uid
    editable: true
    jsonData:
      httpMethod: GET
      serviceMap:
        datasourceUid: prometheus_uid
      lokiSearch:
        datasourceUid: loki_uid